<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} — {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      max-width: 700px;
      margin: 0 auto;
      padding: 2rem 1rem;
      line-height: 1.7;
      color: #333;
    }
    header {
      margin-bottom: 2rem;
    }
    header h1 {
      margin-bottom: 0.25rem;
    }
    header h1 a {
      color: #333;
      text-decoration: none;
    }
    nav a {
      margin-right: 1rem;
      color: #555;
      text-decoration: none;
    }
    nav a:hover {
      color: #000;
    }
    a { color: #0366d6; }
    img {
      max-width: 100%;
      height: auto;
    }
    blockquote {
      border-left: 3px solid #ddd;
      margin-left: 0;
      padding-left: 1rem;
      color: #666;
    }
    hr {
      border: none;
      border-top: 1px solid #eee;
      margin: 2rem 0;
    }
    footer {
      margin-top: 3rem;
      padding-top: 1rem;
      border-top: 1px solid #eee;
      font-size: 0.9rem;
      color: #999;
    }
    footer a {
      color: #999;
      margin-right: 1rem;
    }
  </style>
</head>
<body>
  <header>
    <h1><a href="/">{{ site.title }}</a></h1>
    <nav>
      <a href="/">Home</a>
      <a href="/about/">About</a>
    </nav>
  </header>

  <main>
    {{ content }}
  </main>

  <footer>
    <a href="https://github.com/xiaomingleng">GitHub</a>
  </footer>
</body>
</html>
